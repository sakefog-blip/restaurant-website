<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Half Fried</title>

<style>

body{
font-family:Arial;
margin:0;
background:#0b0000;
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:#120000;
}

nav img{
height:40px;
}

nav button{
padding:10px 20px;
background:red;
color:white;
border:none;
cursor:pointer;
}

/* BRANCH */

.branches{
text-align:center;
padding:80px 20px;
}

.branch{
background:#1a0000;
margin:20px auto;
padding:30px;
max-width:400px;
border-radius:10px;
cursor:pointer;
}

.branch:hover{
background:#300000;
}

/* MENU */

.menu{
display:none;
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#1a0000;
padding:15px;
border-radius:10px;
}

.card img{
width:100%;
border-radius:8px;
}

.card button{
margin-top:10px;
background:red;
border:none;
color:white;
padding:8px 15px;
cursor:pointer;
}

/* CART PAGE */

#cartPage{
display:none;
padding:40px;
}

.cart-item{
display:flex;
justify-content:space-between;
background:#1a0000;
padding:10px;
margin:10px 0;
}

</style>

</head>

<body>

<nav>

<img src="logo.png">

<button onclick="openCart()">Cart (<span id="count">0</span>)</button>

</nav>

<div class="branches" id="branches">

<h1>Select Branch</h1>

<div class="branch" onclick="openRestaurant()">
Half Fried – Lado Sarai Delhi
</div>

<div class="branch" onclick="openRestaurant()">
Half Fried – Mayur Vihar Delhi
</div>

<div class="branch" onclick="openRestaurant()">
Half Fried – Mumbai
</div>

</div>

<div class="menu" id="menu">

<h2>Menu</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">
<h3>Burger</h3>
<p>₹149</p>
<button onclick="add('Burger',149)">Add</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
<h3>Pizza</h3>
<p>₹299</p>
<button onclick="add('Pizza',299)">Add</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1601924638867-3ec2f8a33d3b">
<h3>Noodles</h3>
<p>₹199</p>
<button onclick="add('Noodles',199)">Add</button>
</div>

</div>

</div>

<div id="cartPage">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3>Total: ₹<span id="total">0</span></h3>

<button onclick="closeCart()">Back</button>

</div>

<script>

let cart=[]
let total=0

function openRestaurant(){

document.getElementById("branches").style.display="none"

document.getElementById("menu").style.display="block"

}

function add(name,price){

cart.push({name,price})

total+=price

document.getElementById("count").innerText=cart.length

}

function openCart(){

document.getElementById("menu").style.display="none"

document.getElementById("cartPage").style.display="block"

renderCart()

}

function closeCart(){

document.getElementById("cartPage").style.display="none"

document.getElementById("menu").style.display="block"

}

function renderCart(){

let html=""

cart.forEach((item,i)=>{

html+=`<div class="cart-item">

${item.name} - ₹${item.price}

<button onclick="removeItem(${i})">Remove</button>

</div>`

})

document.getElementById("cartItems").innerHTML=html

document.getElementById("total").innerText=total

}

function removeItem(i){

total-=cart[i].price

cart.splice(i,1)

document.getElementById("count").innerText=cart.length

renderCart()

}

</script>

</body>

</html>
