<!DOCTYPE html>
<html>
<head>
<title>3D Cricket Game</title>
<style>
body { margin: 0; overflow: hidden; }
#score {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  font-size: 24px;
}
</style>
</head>
<body>

<div id="score">Score: 0</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer();

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Light
let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(0, 50, 50);
scene.add(light);

// Ground
let groundGeo = new THREE.PlaneGeometry(200, 200);
let groundMat = new THREE.MeshPhongMaterial({ color: 0x228B22 });
let ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// Pitch
let pitchGeo = new THREE.BoxGeometry(5, 0.1, 40);
let pitchMat = new THREE.MeshPhongMaterial({ color: 0xdeb887 });
let pitch = new THREE.Mesh(pitchGeo, pitchMat);
pitch.position.y = 0.05;
scene.add(pitch);

// Bat
let batGeo = new THREE.BoxGeometry(1, 8, 0.5);
let batMat = new THREE.MeshPhongMaterial({ color: 0x8B4513 });
let bat = new THREE.Mesh(batGeo, batMat);
bat.position.set(-10, 4, 0);
scene.add(bat);

// Ball
let ballGeo = new THREE.SphereGeometry(0.5, 32, 32);
let ballMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
let ball = new THREE.Mesh(ballGeo, ballMat);
scene.add(ball);

let ballSpeed = 0.5;
let score = 0;

function resetBall() {
  ball.position.set(20, 1, 0);
  ballSpeed += 0.02;
}

resetBall();

// Camera
camera.position.set(-20, 10, 20);
camera.lookAt(0,0,0);

// Controls (bat move)
window.addEventListener("mousemove", (e) => {
  let y = (e.clientY / window.innerHeight) * 10;
  bat.position.y = y;
});

// Hit
window.addEventListener("click", () => {
  let dist = bat.position.distanceTo(ball.position);

  if(dist < 3){
    let runs = Math.floor(Math.random()*6)+1;
    score += runs;
    document.getElementById("score").innerText = "Score: " + score;

    alert("Hit! " + runs + " runs 🏏");
    resetBall();
  }
});

// Animation
function animate(){
  requestAnimationFrame(animate);

  ball.position.x -= ballSpeed;

  // OUT
  if(ball.position.x < -20){
    alert("OUT! Final Score: " + score);
    location.reload();
  }

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
