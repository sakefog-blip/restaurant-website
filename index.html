<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
font-family:Poppins;
color:white;
text-align:center;
overflow:hidden;
}

.container{
max-width:500px;
z-index:2;
}

h1{
font-size:60px;
font-family:Pacifico;
animation:fade 2s;
}

h2{
font-size:35px;
}

@keyframes fade{
from{opacity:0;transform:translateY(40px)}
to{opacity:1;transform:translateY(0)}
}

button{
padding:15px 35px;
font-size:22px;
margin:10px;
border:none;
border-radius:12px;
cursor:pointer;
}

#yes{
background:#00e676;
}

#no{
background:#ff1744;
position:absolute;
}

.hidden{
display:none;
}

.message{
font-size:26px;
margin-top:20px;
}

/* hearts */

.heart{
position:absolute;
top:-20px;
font-size:24px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh);
opacity:0;
}
}

/* confetti */

.confetti{
position:absolute;
width:10px;
height:10px;
background:white;
animation:explode 2s linear forwards;
}

@keyframes explode{
to{
transform:translateY(300px) rotate(720deg);
opacity:0;
}
}

</style>

</head>

<body>

<div class="container">

<h1 id="hello">Hey Love this side shivam singh rajput  ❤️</h1>

<h2 id="question" class="hidden">Do you love me?</h2>

<div id="buttons" class="hidden">

<button id="yes" onclick="yesClick()">YES 💖</button>

<button id="no">NO 😅</button>

</div>

<div id="result" class="hidden message"></div>

</div>

<script>

/* show question */

setTimeout(()=>{

document.getElementById("question").classList.remove("hidden")
document.getElementById("buttons").classList.remove("hidden")

},2500)

/* YES click */

function yesClick(){

document.getElementById("result").classList.remove("hidden")

document.getElementById("result").innerHTML=

"Yay! ❤️<br><br>\
You jbhakk chinar dikh rahe hai halanki chinar wala harakkat kr dete hai wo alag baat hai  ✨<br><br>\
Are you Google? Because you have everything I've been searching for 😍<br><br>\
If loving you was a job, I'd never take a day off 💖<br><br>\
Life feels brighter with you in it ❤️"

createConfetti()

}

/* NO button run away */

let no=document.getElementById("no")

let attempts=0

no.addEventListener("mouseover",function(){

if(attempts<50){

let x=Math.random()*window.innerWidth-100
let y=Math.random()*window.innerHeight-100

no.style.left=x+"px"
no.style.top=y+"px"

attempts++

}

})

/* hearts animation */

function createHeart(){

let heart=document.createElement("div")

heart.classList.add("heart")

heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"

heart.style.animationDuration=(Math.random()*3+3)+"s"

document.body.appendChild(heart)

setTimeout(()=>{

heart.remove()

},6000)

}

setInterval(createHeart,300)

/* confetti fireworks */

function createConfetti(){

for(let i=0;i<80;i++){

let confetti=document.createElement("div")

confetti.classList.add("confetti")

confetti.style.left=Math.random()*100+"vw"

confetti.style.top=Math.random()*50+"vh"

confetti.style.background="hsl("+Math.random()*360+",100%,50%)"

document.body.appendChild(confetti)

setTimeout(()=>{

confetti.remove()

},2000)

}

}

</script>

</body>

</html>
