<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Half Fried Restaurant</title>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#000;
color:white;
line-height:1.6;
}

/* HERO SECTION */

.hero{
height:100vh;
background-image:url("https://images.unsplash.com/photo-1550547660-d9450f859349");
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:60px;
letter-spacing:2px;
}

.hero p{
font-size:22px;
margin-top:10px;
}

.hero button{
margin-top:25px;
padding:15px 30px;
font-size:18px;
background:red;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.hero button:hover{
transform:scale(1.1);
background:#ff3333;
}

/* MENU SECTION */

.menu{
padding:80px 20px;
background:#111;
text-align:center;
}

.menu h2{
font-size:36px;
margin-bottom:40px;
}

.menu-container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;
}

.card{
background:#222;
padding:25px;
width:230px;
border-radius:10px;
transition:0.3s;
}

.card:hover{
transform:scale(1.08);
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.card h3{
margin-bottom:10px;
}

/* FOOD GALLERY */

.gallery{
padding:80px 20px;
text-align:center;
background:#000;
}

.gallery h2{
font-size:36px;
margin-bottom:40px;
}

.gallery-container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
}

.gallery img{
width:300px;
border-radius:10px;
transition:0.4s;
}

.gallery img:hover{
transform:scale(1.1) rotate(2deg);
}

/* SCROLL ANIMATION */

.reveal{
opacity:0;
transform:translateY(60px);
transition:all 0.8s ease;
}

.reveal.active{
opacity:1;
transform:translateY(0);
}

/* WHATSAPP BUTTON */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px 20px;
border-radius:50px;
text-decoration:none;
font-size:18px;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

/* MOBILE RESPONSIVE */

@media(max-width:768px){

.hero h1{
font-size:40px;
}

.gallery img{
width:90%;
}

.menu-container{
flex-direction:column;
align-items:center;
}

}

</style>

</head>

<body>

<!-- HERO -->

<section class="hero">

<h1>HALF FRIED</h1>
<p>Best Burgers • Fast Food • Chinese</p>
<button>Order Now</button>

</section>

<!-- MENU -->

<section class="menu reveal">

<h2>Our Menu</h2>

<div class="menu-container">

<div class="card">
<h3>Burger</h3>
<p>Juicy grilled burger with cheese</p>
<p>₹149</p>
</div>

<div class="card">
<h3>Pizza</h3>
<p>Hot cheesy pizza</p>
<p>₹299</p>
</div>

<div class="card">
<h3>Noodles</h3>
<p>Chinese style noodles</p>
<p>₹199</p>
</div>

</div>

</section>

<!-- GALLERY -->

<section class="gallery reveal">

<h2>Our Food</h2>

<div class="gallery-container">

<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">
<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
<img src="https://images.unsplash.com/photo-1601924638867-3ec2f8a33d3b">

</div>

</section>

<!-- WHATSAPP BUTTON -->

<a class="whatsapp" href="https://wa.me/919999999999" target="_blank">
Order on WhatsApp
</a>

<!-- SCROLL SCRIPT -->

<script>

function reveal(){

var reveals=document.querySelectorAll(".reveal");

for(var i=0;i<reveals.length;i++){

var windowHeight=window.innerHeight;
var elementTop=reveals[i].getBoundingClientRect().top;
var elementVisible=120;

if(elementTop < windowHeight - elementVisible){

reveals[i].classList.add("active");

}

}

}

window.addEventListener("scroll",reveal);

</script>

</body>
</html>
