<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🔥 Adventure Quest</title>

<style>
body {
  background: #0f172a;
  color: #fff;
  font-family: Arial;
  text-align: center;
}

.game-container {
  margin-top: 50px;
}

#story {
  font-size: 20px;
  margin: 20px;
}

#stats {
  margin: 10px;
  font-size: 16px;
}

button {
  padding: 10px 20px;
  margin: 10px;
  border: none;
  background: #22c55e;
  color: black;
  cursor: pointer;
  border-radius: 8px;
  font-weight: bold;
}

button:hover {
  background: #16a34a;
}
</style>
</head>

<body>

<div class="game-container">
  <h1>⚔️ Adventure Quest</h1>

  <div id="stats"></div>
  <div id="story"></div>
  <div id="choices"></div>
</div>

<script>
const story = document.getElementById("story");
const choices = document.getElementById("choices");
const stats = document.getElementById("stats");

let gameState = {
  health: 100,
  inventory: []
};

// SCENES
const scenes = {
  start: {
    text: "🌲 You wake up in a dark forest. Two paths ahead.",
    options: [
      { text: "Go Left 🌊", next: "river" },
      { text: "Go Right 🕳️", next: "cave" }
    ]
  },

  river: {
    text: "🌊 You reached a river. You see a boat.",
    options: [
      { text: "Take Boat 🚤", next: "treasure" },
      { text: "Swim 🏊", next: "death" }
    ]
  },

  cave: {
    text: "🕳️ You enter a cave. A monster appears!",
    options: [
      { text: "Fight ⚔️", next: "fightMonster" },
      { text: "Run 🏃", next: "start" }
    ]
  },

  fightMonster: {
    text: "⚔️ You fight bravely!",
    action: () => {
      if (Math.random() > 0.5) {
        gameState.inventory.push("Monster Tooth 🦷");
        return "winFight";
      } else {
        gameState.health -= 50;
        return gameState.health > 0 ? "start" : "death";
      }
    }
  },

  winFight: {
    text: "🔥 You defeated the monster! You got a rare item.",
    options: [
      { text: "Continue ➡️", next: "treasure" }
    ]
  },

  treasure: {
    text: "💰 You found the treasure! YOU WIN!",
    options: [
      { text: "Restart 🔁", next: "restart" }
    ]
  },

  death: {
    text: "💀 You died! Game Over.",
    options: [
      { text: "Restart 🔁", next: "restart" }
    ]
  },

  restart: {
    action: () => {
      gameState = { health: 100, inventory: [] };
      return "start";
    }
  }
};

// UPDATE UI
function updateStats() {
  stats.innerHTML = 
    "❤️ Health: " + gameState.health + 
    " | 🎒 Inventory: " + (gameState.inventory.join(", ") || "Empty");
}

// LOAD SCENE
function loadScene(sceneKey) {
  const scene = scenes[sceneKey];

  if (scene.action) {
    return loadScene(scene.action());
  }

  story.innerText = scene.text;
  choices.innerHTML = "";

  updateStats();

  scene.options.forEach(option => {
    const btn = document.createElement("button");
    btn.innerText = option.text;
    btn.onclick = () => loadScene(option.next);
    choices.appendChild(btn);
  });
}

// START GAME
loadScene("start");
</script>

</body>
</html>
