<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Half Fried Restaurant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{
background:#0a0000;
color:white;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 50px;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
z-index:1000;
}

nav h2{
color:#ff3b3b;
font-weight:800;
}

nav ul{
display:flex;
gap:25px;
list-style:none;
}

nav ul li a{
color:white;
text-decoration:none;
font-weight:600;
}

/* HERO PARALLAX */

.hero{

height:100vh;

background-image:url("https://images.unsplash.com/photo-1550547660-d9450f859349");

background-attachment:fixed;

background-size:cover;

background-position:center;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

flex-direction:column;

}

.hero h1{
font-size:70px;
font-weight:800;
}

.hero p{
font-size:22px;
margin-top:10px;
}

.hero button{
margin-top:30px;
padding:15px 35px;
border:none;
background:#ff3b3b;
color:white;
font-size:18px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.hero button:hover{
transform:scale(1.1);
}

/* SECTION */

section{
padding:100px 10%;
text-align:center;
}

/* GLASSMORPHISM CARDS */

.menu-container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:30px;
margin-top:50px;
}

.card{

background:rgba(255,255,255,0.05);

backdrop-filter:blur(10px);

border-radius:15px;

padding:30px;

width:250px;

transition:0.4s;

}

.card:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:0 10px 30px rgba(255,0,0,0.3);
}

.card img{
width:100%;
border-radius:10px;
margin-bottom:15px;
}

/* PARALLAX FOOD SECTION */

.food-parallax{

height:400px;

background-image:url("https://images.unsplash.com/photo-1600891964599-f61ba0e24092");

background-attachment:fixed;

background-size:cover;

background-position:center;

display:flex;

justify-content:center;

align-items:center;

font-size:40px;

font-weight:800;

}

/* GALLERY */

.gallery{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
margin-top:40px;
}

.gallery img{
width:280px;
border-radius:12px;
transition:0.4s;
}

.gallery img:hover{
transform:scale(1.1) rotate(2deg);
}

/* ORDER BUTTON */

.whatsapp{

position:fixed;

bottom:20px;

right:20px;

background:#25D366;

color:white;

padding:15px 20px;

border-radius:50px;

text-decoration:none;

font-weight:600;

}

/* SCROLL ANIMATION */

.reveal{
opacity:0;
transform:translateY(80px);
transition:1s;
}

.reveal.active{
opacity:1;
transform:translateY(0);
}

/* MOBILE */

@media(max-width:768px){

nav{
padding:15px 20px;
}

.hero h1{
font-size:40px;
}

.menu-container{
flex-direction:column;
align-items:center;
}

.gallery img{
width:90%;
}

}

</style>

</head>

<body>

<nav>

<h2>HALF FRIED</h2>

<ul>

<li><a href="#home">Home</a></li>

<li><a href="#menu">Menu</a></li>

<li><a href="#gallery">Gallery</a></li>

</ul>

</nav>

<!-- HERO -->

<section class="hero" id="home">

<h1>HALF FRIED</h1>

<p>Luxury Burgers • Fast Food • Chinese</p>

<button>Order Now</button>

</section>

<!-- MENU -->

<section id="menu" class="reveal">

<h2>Our Special Menu</h2>

<div class="menu-container">

<div class="card">

<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">

<h3>Cheese Burger</h3>

<p>₹149</p>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">

<h3>Pizza</h3>

<p>₹299</p>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1601924638867-3ec2f8a33d3b">

<h3>Noodles</h3>

<p>₹199</p>

</div>

</div>

</section>

<!-- PARALLAX -->

<div class="food-parallax">

DELICIOUS FOOD EXPERIENCE

</div>

<!-- GALLERY -->

<section id="gallery" class="reveal">

<h2>Food Gallery</h2>

<div class="gallery">

<img src="https://images.unsplash.com/photo-1550547660-d9450f859349">

<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">

<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">

</div>

</section>

<!-- WHATSAPP -->

<a class="whatsapp" href="https://wa.me/919999999999" target="_blank">

Order Now

</a>

<script>

function reveal(){

var reveals=document.querySelectorAll(".reveal");

for(var i=0;i<reveals.length;i++){

var windowHeight=window.innerHeight;

var elementTop=reveals[i].getBoundingClientRect().top;

var elementVisible=100;

if(elementTop < windowHeight - elementVisible){

reveals[i].classList.add("active");

}

}

}

window.addEventListener("scroll",reveal);

</script>

</body>

</html>
