<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Half Fried</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#0a0000;
color:white;
}

.hero{

height:100vh;

background-image:url("https://images.unsplash.com/photo-1550547660-d9450f859349");

background-size:cover;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

}

.hero h1{
font-size:70px;
}

.menu{
padding:100px 20px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.card{
background:#1a0000;
padding:15px;
border-radius:10px;
}

.card img{
width:100%;
border-radius:10px;
}

.gallery{
padding:100px 20px;
text-align:center;
}

.gallery img{
width:280px;
margin:10px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="hero">

<h1 data-aos="zoom-in">HALF FRIED</h1>

<p data-aos="fade-up">Best Burgers • Fast Food • Chinese</p>

</div>

<section class="menu">

<h2 data-aos="fade-up">Our Menu</h2>

<div class="grid">

<div class="card" data-aos="fade-right">

<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">

<h3>Burger</h3>

<p>₹149</p>

</div>

<div class="card" data-aos="zoom-in">

<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">

<h3>Pizza</h3>

<p>₹299</p>

</div>

<div class="card" data-aos="fade-left">

<img src="https://images.unsplash.com/photo-1601924638867-3ec2f8a33d3b">

<h3>Noodles</h3>

<p>₹199</p>

</div>

</div>

</section>

<section class="gallery">

<h2 data-aos="fade-up">Food Gallery</h2>

<img data-aos="zoom-in" src="https://images.unsplash.com/photo-1550547660-d9450f859349">

<img data-aos="zoom-in" src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">

<img data-aos="zoom-in" src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">

</section>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>

AOS.init();

</script>

</body>

</html>
