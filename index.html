<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🔥 Mini Battle Royale</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

canvas {
  display: block;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// PLAYER
const player = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  size: 20,
  color: "lime",
  speed: 5,
  health: 100
};

// ENEMY
const enemy = {
  x: 100,
  y: 100,
  size: 20,
  color: "red",
  speed: 2,
  health: 100
};

// BULLETS
let bullets = [];

// CONTROLS
let keys = {};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// SHOOT
document.addEventListener("click", e => {
  bullets.push({
    x: player.x,
    y: player.y,
    dx: (e.clientX - player.x) / 20,
    dy: (e.clientY - player.y) / 20
  });
});

// GAME LOOP
function update() {

  // PLAYER MOVEMENT
  if (keys["w"]) player.y -= player.speed;
  if (keys["s"]) player.y += player.speed;
  if (keys["a"]) player.x -= player.speed;
  if (keys["d"]) player.x += player.speed;

  // ENEMY FOLLOW
  let dx = player.x - enemy.x;
  let dy = player.y - enemy.y;
  let dist = Math.sqrt(dx*dx + dy*dy);

  enemy.x += dx / dist * enemy.speed;
  enemy.y += dy / dist * enemy.speed;

  // BULLETS MOVE
  bullets.forEach(b => {
    b.x += b.dx;
    b.y += b.dy;
  });

  // COLLISION
  bullets.forEach((b, i) => {
    let dx = b.x - enemy.x;
    let dy = b.y - enemy.y;
    if (Math.sqrt(dx*dx + dy*dy) < enemy.size) {
      enemy.health -= 10;
      bullets.splice(i, 1);
    }
  });

  // ENEMY DAMAGE PLAYER
  if (dist < 30) {
    player.health -= 0.5;
  }
}

// DRAW
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // PLAYER
  ctx.fillStyle = player.color;
  ctx.fillRect(player.x, player.y, player.size, player.size);

  // ENEMY
  ctx.fillStyle = enemy.color;
  ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);

  // BULLETS
  ctx.fillStyle = "yellow";
  bullets.forEach(b => {
    ctx.fillRect(b.x, b.y, 5, 5);
  });

  // HEALTH
  ctx.fillStyle = "white";
  ctx.fillText("Player HP: " + Math.floor(player.health), 20, 20);
  ctx.fillText("Enemy HP: " + enemy.health, 20, 40);
}

// GAME LOOP
function gameLoop() {
  update();
  draw();

  if (player.health <= 0) {
    alert("💀 You Died!");
    location.reload();
  }

  if (enemy.health <= 0) {
    alert("🏆 You Win!");
    location.reload();
  }

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
