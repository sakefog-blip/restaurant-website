<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
font-family:Poppins;
color:white;
text-align:center;
overflow:hidden;
}

.container{
max-width:500px;
z-index:2;
}

h1{
font-size:55px;
font-family:Pacifico;
animation:fade 2s ease-in-out;
}

h2{
font-size:35px;
margin-top:20px;
animation:fade 2s ease-in-out;
}

@keyframes fade{
from{opacity:0;transform:translateY(40px)}
to{opacity:1;transform:translateY(0)}
}

button{
padding:15px 30px;
font-size:20px;
margin:10px;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

#yes{
background:#00e676;
color:white;
}

#yes:hover{
transform:scale(1.1);
}

#no{
background:#ff1744;
color:white;
position:absolute;
}

.hidden{
display:none;
}

.message{
font-size:24px;
margin-top:20px;
}

/* hearts */

.heart{
position:absolute;
top:-50px;
font-size:24px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh);
opacity:0;
}
}

</style>

</head>

<body>

<div class="container">

<h1 id="hello">Hey Ankit 👋</h1>

<h2 id="question" class="hidden">Do you love me? ❤️</h2>

<div id="buttons" class="hidden">

<button id="yes" onclick="yesClick()">YES ❤️</button>

<button id="no">NO 😅</button>

</div>

<div id="result" class="hidden message"></div>

</div>

<script>

/* show question */

setTimeout(()=>{

document.getElementById("question").classList.remove("hidden")
document.getElementById("buttons").classList.remove("hidden")

},2500)

/* YES click */

function yesClick(){

document.getElementById("result").classList.remove("hidden")

document.getElementById("result").innerHTML=
"Yay! ❤️<br><br>\
You just made my world brighter ✨<br>\
Are you Google? Because you have everything I was searching for 😍<br><br>\
If loving you was a job, I'd never take a day off 💖"

}

/* NO run away */

let no=document.getElementById("no")

no.addEventListener("mouseover",function(){

let x=Math.random()*window.innerWidth-100
let y=Math.random()*window.innerHeight-100

no.style.left=x+"px"
no.style.top=y+"px"

})

/* falling hearts */

function createHeart(){

let heart=document.createElement("div")

heart.classList.add("heart")

heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"

heart.style.animationDuration=(Math.random()*3+3)+"s"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},6000)

}

setInterval(createHeart,300)

</script>

</body>

</html>
