<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Half Fried</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
scroll-behavior:smooth;
}

body{
background:#0a0000;
color:white;
}

/* SPLASH */

#splash{
position:fixed;
width:100%;
height:100vh;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:45px;
font-weight:800;
animation:fadeout 3s forwards;
}

@keyframes fadeout{
0%{opacity:1}
90%{opacity:1}
100%{opacity:0;visibility:hidden}
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:20px 40px;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
z-index:1000;
}

nav a{
color:white;
text-decoration:none;
margin:0 10px;
}

/* HERO */

.hero{
height:100vh;
background-image:url("https://images.unsplash.com/photo-1550547660-d9450f859349");
background-attachment:fixed;
background-size:cover;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.hero h1{
font-size:70px;
font-weight:800;
}

/* MENU */

.menu{
padding:120px 10%;
text-align:center;
}

.menu-grid{
display:flex;
flex-wrap:wrap;
gap:30px;
justify-content:center;
margin-top:40px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:20px;
width:250px;
border-radius:15px;
transition:0.4s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:10px;
}

/* GALLERY */

.gallery{
padding:120px 10%;
text-align:center;
}

.gallery img{
width:300px;
margin:10px;
border-radius:10px;
transition:0.4s;
}

.gallery img:hover{
transform:scale(1.1);
}

/* BOOK */

.book{
padding:120px 10%;
text-align:center;
}

.book input{
padding:12px;
margin:10px;
width:250px;
}

.book button{
padding:12px 30px;
background:red;
border:none;
color:white;
}

/* CART */

#cart{
position:fixed;
bottom:20px;
left:20px;
background:black;
padding:15px;
border-radius:10px;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px 20px;
border-radius:50px;
color:white;
text-decoration:none;
}

</style>

</head>

<body>

<div id="splash">

HALF FRIED

</div>

<nav>

<div>HALF FRIED</div>

<div>

<a href="#menu">Menu</a>
<a href="#gallery">Gallery</a>
<a href="#book">Book</a>

</div>

</nav>

<section class="hero">

<h1>HALF FRIED</h1>

<p>Best Burgers • Fast Food • Chinese</p>

</section>

<section class="menu" id="menu">

<h2>Menu</h2>

<div class="menu-grid">

<div class="card">

<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">

<h3>Burger</h3>

<p>₹149</p>

<button onclick="add()">Add</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">

<h3>Pizza</h3>

<p>₹299</p>

<button onclick="add()">Add</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1601924638867-3ec2f8a33d3b">

<h3>Noodles</h3>

<p>₹199</p>

<button onclick="add()">Add</button>

</div>

</div>

</section>

<section class="gallery" id="gallery">

<h2>Food Gallery</h2>

<img src="https://images.unsplash.com/photo-1550547660-d9450f859349">

<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">

<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">

</section>

<section class="book" id="book">

<h2>Book Table</h2>

<input placeholder="Name"><br>

<input placeholder="Mobile"><br>

<button>Book</button>

</section>

<div id="cart">

Orders: <span id="num">0</span>

</div>

<a class="whatsapp" href="https://wa.me/919999999999">Order</a>

<script>

let n=0;

function add(){

n++;

document.getElementById("num").innerText=n;

}

</script>

</body>

</html>
