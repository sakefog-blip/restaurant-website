<!DOCTYPE html>
<html>
<head>
<title>Cricket Game</title>
<style>
body {
  margin: 0;
  background: green;
  overflow: hidden;
  font-family: Arial;
}
canvas {
  display: block;
}
#score {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  font-size: 24px;
}
</style>
</head>
<body>

<div id="score">Score: 0</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let ball = { x: canvas.width, y: canvas.height/2, speed: 8 };
let bat = { x: 100, y: canvas.height/2 };
let score = 0;
let gameOver = false;

// Mouse move = bat control
window.addEventListener("mousemove", (e) => {
  bat.y = e.y;
});

// Hit action
window.addEventListener("click", () => {
  if(gameOver) return;

  if(Math.abs(ball.y - bat.y) < 50 && ball.x < 200){
    let runs = Math.floor(Math.random() * 6) + 1;

    if(runs >= 5){
      score += 6;
      alert("SIX!! 🔥");
    } else if(runs >= 4){
      score += 4;
      alert("FOUR!! 🚀");
    } else {
      score += runs;
      alert(runs + " runs");
    }

    resetBall();
  }
});

function resetBall(){
  ball.x = canvas.width;
  ball.y = Math.random() * canvas.height;
  ball.speed += 0.5;
}

function drawBat(){
  ctx.fillStyle = "brown";
  ctx.fillRect(bat.x, bat.y - 50, 20, 100);
}

function drawBall(){
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, 10, 0, Math.PI * 2);
  ctx.fillStyle = "white";
  ctx.fill();
}

function update(){
  if(gameOver) return;

  ball.x -= ball.speed;

  // OUT condition
  if(ball.x < 0){
    gameOver = true;
    alert("OUT! Final Score: " + score);
    location.reload();
  }
}

function draw(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawBat();
  drawBall();

  document.getElementById("score").innerText = "Score: " + score;
}

function gameLoop(){
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
